services:
  mongo-users:
    image: mongo:7
    container_name: infra-mongo-users
    restart: unless-stopped
    ports:
      - "${MONGO_USERS_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERS_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_USERS_ROOT_PASS:-password}
    volumes:
      - mongo_users_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://${MONGO_USERS_ROOT_USER:-admin}:${MONGO_USERS_ROOT_PASS:-password}@localhost:27017/admin?authSource=admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - infra-net

  mongo-express-users:
    image: mongo-express:1
    container_name: infra-mongo-express-users
    restart: unless-stopped
    depends_on:
      mongo-users:
        condition: service_healthy
    ports:
      - "${MONGO_EXPRESS_USERS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERS_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_USERS_ROOT_PASS:-password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERS_ROOT_USER:-admin}:${MONGO_USERS_ROOT_PASS:-password}@mongo-users:27017/admin?authSource=admin
    networks:
      - infra-net

  mongo-products:
    image: mongo:7
    container_name: infra-mongo-products
    restart: unless-stopped
    ports:
      - "${MONGO_PRODUCTS_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_PRODUCTS_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PRODUCTS_ROOT_PASS:-password}
    volumes:
      - mongo_products_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://${MONGO_PRODUCTS_ROOT_USER:-admin}:${MONGO_PRODUCTS_ROOT_PASS:-password}@localhost:27017/admin?authSource=admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - infra-net

  mongo-express-products:
    image: mongo-express:1
    container_name: infra-mongo-express-products
    restart: unless-stopped
    depends_on:
      mongo-products:
        condition: service_healthy
    ports:
      - "${MONGO_EXPRESS_PRODUCTS_PORT:-8083}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_PRODUCTS_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PRODUCTS_ROOT_PASS:-password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_PRODUCTS_ROOT_USER:-admin}:${MONGO_PRODUCTS_ROOT_PASS:-password}@mongo-products:27017/admin?authSource=admin
    networks:
      - infra-net

  postgres:
    image: postgres:16
    container_name: infra-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orders}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-orders} -h localhost"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - infra-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: infra-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-8082}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-password}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - infra-net

networks:
  infra-net:
    driver: bridge

volumes:
  mongo_users_data:
  mongo_products_data:
  postgres_data:
  pgadmin_data: